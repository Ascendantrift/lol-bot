name: main-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ARTIFACT_VERSION: v0.${{ github.run_number }}

jobs:
  build_bot:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ascendantrift/lol-bot:${{ env.ARTIFACT_VERSION }}
            ghcr.io/ascendantrift/lol-bot:latest